name: Build and Test Release

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: cargo build --release --verbose
    - name: Run tests
      run: cargo test --verbose

  # Lint gate — clippy + fmt + rustdoc (NEXT_STEPS.md §5.3). All three
  # promoted to errors; CI rejects PRs that violate any of them. The
  # local `/lint-rust` slash command runs the same checks.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: fmt --check
        run: cargo fmt --check
      - name: rustdoc
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --no-deps

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Run tests with coverage
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info
      - name: Print coverage summary
        run: cargo llvm-cov report
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: lcov
          path: lcov.info
      # Floor enforcement is intentionally deferred. Once the baseline
      # has been observed in CI a few times, a follow-up PR adds
      # `cargo llvm-cov report --fail-under-lines <baseline - 2>` here.

  # PR-only "all tests" job. Runs the default suite *plus* the unstuck
  # `#[ignore]`d tests (large-file streaming, subprocess heal — both
  # the basic respawn and the §1.5b anti-entropy refill). Series I
  # fixed the TCP-proxy deadlock so the two `gateway_tcp_proxy_*` tests
  # now run on the default path; no `#[ignore]` filter needed for them.
  pr_full_tests:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build (release)
        run: cargo build --release --verbose
      - name: Run default suite
        run: cargo test --release --verbose
      - name: Run unstuck ignored tests (heal subprocess + 100 MB streaming)
        run: cargo test --release -- --ignored full_heal large_file_streaming respawn_inherits_storage_root anti_entropy_refills_content_after_respawn
